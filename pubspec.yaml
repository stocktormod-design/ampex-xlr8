name: ampex_mobile
description: Ampex – operativsystemet for elektrofirmaer (mobil).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.4
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdfx: ^2.9.2
  sqlite3_flutter_libs: ^0.5.32
  supabase_flutter: ^2.9.0
  uuid: ^4.5.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.26.0

flutter:
  uses-material-design: true
  assets:
    - .env
