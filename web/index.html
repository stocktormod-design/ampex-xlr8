<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ampex – operativsystemet for elektrofirmaer">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ampex">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ampex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    body { margin: 0; background: #080a0f; font-family: Inter, system-ui, sans-serif; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; color: #ffffff;
      padding: 24px; text-align: center;
    }
    #loading p { margin-top: 12px; color: #8b93a7; font-size: 14px; max-width: 420px; }
    #loading.error p { color: #ff6b6b; }
  </style>
  <div id="loading">
    <strong>Ampex</strong>
    <p>Laster Flutter … første gang kan ta 30–60 sekunder.</p>
  </div>
  <script>
    (function () {
      var loading = document.getElementById('loading');
      function setMsg(text, isError) {
        var p = loading && loading.querySelector('p');
        if (p) {
          p.textContent = text;
          if (isError && loading) loading.classList.add('error');
        }
      }

      // Unngå at gammel service worker / HTTP-cache serverer gammel main.dart.js.
      if (location.hostname === 'localhost') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
      }

      window.addEventListener('error', function (e) {
        setMsg('JavaScript-feil: ' + (e.message || 'ukjent'), true);
      });
      window.addEventListener('unhandledrejection', function (e) {
        setMsg('Feil: ' + (e.reason && e.reason.message ? e.reason.message : e.reason), true);
      });
      window.addEventListener('flutter-first-frame', function () {
        loading && loading.remove();
      });
      setTimeout(function () {
        if (document.getElementById('loading')) {
          setMsg(
            'Flutter laster fortsatt. Sjekk terminalen (flutter run). ' +
            'Prøv hard refresh (Cmd+Shift+R) eller: flutter run -d chrome'
          );
        }
      }, 60000);
    })();
  </script>
  <!-- pdf.js må være klar før Flutter registrerer pdfx-plugin -->
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs';
    globalThis.pdfjsLib = pdfjsLib;
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.mjs';
    globalThis.pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/cmaps/',
      cMapPacked: true,
    };
    var flutter = document.createElement('script');
    flutter.src = 'flutter_bootstrap.js';
    flutter.async = true;
    document.body.appendChild(flutter);
  </script>
</body>
</html>
